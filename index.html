<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <form id="form-container">

        <label for="nombre">Nombre: </label>
        <input type="text" id="nombre" name="nombre" minlength="5" placeholder="John Doe" required>

        <label for="mail">Mail: </label>
        <input type="email" id="mail" name="mail" placeholder="johndoe@mail.com" required>

        <label for="edad">Edad: </label>
        <input type="number" id="edad" name="edad" required>

        <label for="pais">Pais: </label>
        <select name="pais" id="select-pais" required>
            <option value=""> --- Seleccionar ---</option>
            <option value="Argentina">Argentina</option>
            <option value="Brasil">Brasil</option>
            <option value="Chile">Chile</option>
            <option value="Colombia">Colombia</option>
        </select>

        <div class="terminos-container">
            <label for="terminos">Aceptar términos: </label>
            <input type="checkbox" id="terminos" name="terminos" required>
        </div>


        <div class="buttons">
            <button type="reset">Cancelar</button>
            <button id="btn-aceptar">Aceptar</button>
        </div>

    </form>
    <script src="./scripts/script.js"></script>
</body>

</html>
